apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluentbit
  namespace: smart-log-analyzer
  labels:
    app: fluentbit
spec:
  selector:
    matchLabels:
      app: fluentbit
  template:
    metadata:
      labels:
        app: fluentbit
    spec:
      containers:
        - name: fluentbit
          image: cr.fluentbit.io/fluent/fluent-bit:3.0
          ports:
            - containerPort: 2020
              name: metrics
          volumeMounts:
            - name: config
              mountPath: /fluent-bit/etc/fluent-bit.conf
              subPath: fluent-bit.conf
            - name: config
              mountPath: /fluent-bit/etc/parsers.conf
              subPath: parsers.conf
            - name: config
              mountPath: /fluent-bit/etc/enrich.lua
              subPath: enrich.lua
            - name: logs-datasets
              mountPath: /logs-datasets
              readOnly: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
      volumes:
        - name: config
          configMap:
            name: fluentbit-config
        - name: logs-datasets
          hostPath:
            path: /logs-datasets
            type: DirectoryOrCreate