[PARSER]
    Name        hadoop_log
    Format      regex
    Regex       ^(?<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2},\d{3}) (?<log_level>\w+) (?<message>.*)$
    Time_Key    timestamp
    Time_Format %Y-%m-%d %H:%M:%S,%L

[PARSER]
    Name        linux_syslog
    Format      regex
    Regex       ^(?<timestamp>\w{3}\s+\d{1,2} \d{2}:\d{2}:\d{2}) (?<message>.*)$
    Time_Key    timestamp
    Time_Format %b %d %H:%M:%S