spring:
  application:
    name: SmartLogAnalyzerAI

  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        model: gemma3:4b-it-q4_K_M

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/logsAnalyzeDb?currentSchema=log_common}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    database: postgresql

  servlet:
    multipart:
      max-file-size: 2GB
      max-request-size: 2GB


logging:
  level:
    liquibase: TRACE
server:
  port: 8080
