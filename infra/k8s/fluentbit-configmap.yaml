apiVersion: v1
kind: ConfigMap
metadata:
  name: fluentbit-config
  namespace: smart-log-analyzer
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         1
        Log_Level     info
        Parsers_File  /fluent-bit/etc/parsers.conf

    [INPUT]
        Name              tail
        Path              /logs-datasets/hadoop/*.log
        Parser            hadoop_log
        Tag               hadoop.*
        Refresh_Interval  5

    [INPUT]
        Name              tail
        Path              /logs-datasets/linux/*.log
        Parser            linux_syslog
        Tag               linux.*
        Refresh_Interval  5

    [FILTER]
        Name    lua
        Match   linux.*
        Script  /fluent-bit/etc/enrich.lua
        Call    enrich_linux_log

    [FILTER]
        Name    lua
        Match   *
        Script  /fluent-bit/etc/enrich.lua
        Call    add_service_name

    [OUTPUT]
        Name              http
        Match             *
        Host              app
        Port              8080
        URI               /api/logs
        Format            json
        Json_Date_Key     timestamp
        Json_Date_Format  iso8601

  parsers.conf: |
    [PARSER]
        Name        hadoop_log
        Format      regex
        Regex       ^(?<time>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2},\d{3}) (?<level>\w+) (?<message>.*)$
        Time_Key    time
        Time_Format %Y-%m-%d %H:%M:%S,%L

    [PARSER]
        Name        linux_syslog
        Format      regex
        Regex       ^(?<time>\w{3}\s+\d{1,2} \d{2}:\d{2}:\d{2}) (?<message>.*)$
        Time_Key    time
        Time_Format %b %d %H:%M:%S

  enrich.lua: |
    function enrich_linux_log(tag, timestamp, record)
        local msg = (record["message"] or ""):lower()
        if msg:find("error") or msg:find("failure") or msg:find("failed") then
            record["level"] = "ERROR"
        elseif msg:find("warn") or msg:find("alert") then
            record["level"] = "WARN"
        else
            record["level"] = "INFO"
        end
        return 1, timestamp, record
    end

    function add_service_name(tag, timestamp, record)
        if tag:find("hadoop") then
            record["service_name"] = "hadoop"
        else
            record["service_name"] = "linux-server"
        end
        return 1, timestamp, record
    end